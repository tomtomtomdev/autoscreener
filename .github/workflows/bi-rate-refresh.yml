name: BI rate refresh

# Daily, cheap companion to `idx-regime.yml`. BI decides its policy rate mid-month, but
# the full regime.json is rebuilt only monthly (it depends on IDX's month-end ratios). So
# a rate move used to lag the app by up to ~26 days. This job re-reads the published
# regime.json, patches ONLY `biRate` from bi.go.id, and republishes when it changed.
# It never rebuilds the IDX/percentile fields or touches regime-history.json.
# See tools/idx-regime-scraper/regime_scraper/refresh_bi.py.

on:
  schedule:
    # 10:00 UTC daily (17:00 WIB) — after BI publishes an RDG decision in the afternoon.
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  # Share the group with the monthly job so the two never push the data branch at once.
  group: idx-regime
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/idx-regime-scraper
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore the published snapshot from the data branch
        working-directory: .
        run: |
          git fetch origin data || true
          mkdir -p tools/idx-regime-scraper/dist
          git show origin/data:regime.json > tools/idx-regime-scraper/dist/regime.json 2>/dev/null \
            || echo "no published regime.json yet — run idx-regime.yml first"

      - name: Patch the BI rate
        run: python -m regime_scraper.refresh_bi

      - name: Publish to the data branch (only if biRate changed)
        working-directory: .
        run: |
          set -euo pipefail
          dist="$GITHUB_WORKSPACE/tools/idx-regime-scraper/dist"
          [ -f "$dist/regime.json" ] || { echo "nothing to publish"; exit 0; }
          git config user.name "regime-bot"
          git config user.email "regime-bot@users.noreply.github.com"
          git fetch origin data || true
          if ! git show-ref --verify --quiet refs/remotes/origin/data; then
            echo "data branch missing — the monthly job must seed it first"; exit 0
          fi
          git worktree add ../data-branch origin/data
          git -C ../data-branch checkout -B data
          cp "$dist/regime.json" ../data-branch/regime.json
          git -C ../data-branch add regime.json
          git -C ../data-branch commit -m "data: BI rate refresh $(date -u +%F)" || { echo "no change"; exit 0; }
          git -C ../data-branch push origin data
